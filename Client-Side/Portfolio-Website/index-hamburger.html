<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Menu Demo</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header>
        <!-- You will need to add this div "hamburger" to your website.  -->
        <div id="hamburger">
            <hr class="hamline"/>
            <hr class="hamline"/>
            <hr class="hamline"/>
        </div>
        <!-- You probably already have this desktopMenu div, so you don't need to copy it.  -->
        <div id="desktopMenu">
            <a class="menuItem" href="#section1">Red</a>
            <a class="menuItem" href="#section2">Blue</a>
            <a class="menuItem" href="#section3">#BADA55</a>
            <a class="menuItem" href="#section4">Purple</a>
            <a class="menuItem" href="#section5">Orange</a>
        </div>
        <!-- You should have added a div called "mobileMenu" back in Assignment 2 or 3, but up until now you have not had anything in it. Now you need to add your menu items. They should be the same as in your desktop menu. -->
        <div id="mobileMenu">
            <a class="menuItem" href="#section1">Red</a>
            <a class="menuItem" href="#section2">Blue</a>
            <a class="menuItem" href="#section3">#BADA55</a>
            <a class="menuItem" href="#section4">Purple</a>
            <a class="menuItem" href="#section5">Orange</a>
        </div>
    </header>
    <main>
        <section class="section" id="section1"></section>
        <section class="section" id="section2"></section>
        <section class="section" id="section3"></section>
        <section class="section" id="section4"></section>
        <section class="section" id="section5"></section>

    </main>
<script src="main-hamburger.js"></script>
</body>
</html>
